<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jesus is Lord.">
<meta property="og:title" content="Jesus is Lord">
<meta property="og:description" content="krisfraga.com">
<title>Jesus is Lord</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap');

:root{
  --ink:#20262E;
  --blueprint:#1D4E89;
  --gold:#E9A820;
  --sky:#CFE3EF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}

/* ---------- mobile first ---------- */
body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg, var(--sky) 0%, #E9F1F0 60%, #FBF8F1 100%);
  -webkit-text-size-adjust:100%;
}
main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
}
h1{
  font-family:'Bricolage Grotesque', 'Arial Black', system-ui, sans-serif;
  font-weight:800;
  font-size:19vw;
  line-height:1.04;
  letter-spacing:-.02em;
  color:var(--ink);
  text-align:center;
}
h1 span{color:var(--blueprint)}
h1 .dot{color:var(--gold)}
.roofline{
  display:block;
  width:100%;
  height:14vh;
  min-height:70px;
}

/* ---------- larger screens ---------- */
@media (min-width:700px){
  h1{font-size:clamp(80px, 11vw, 168px);line-height:1.02}
  .roofline{height:auto;min-height:0}
  main{padding:48px 24px}
}
</style>
</head>
<body>
  <main>
    <h1>JESUS<br><span>IS LORD</span><span class="dot">.</span></h1>
  </main>
  <svg class="roofline" viewBox="0 0 1440 150" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="none">
    <path d="M0 150 L0 120 L340 120 L560 30 L580 30 L580 8 L596 8 L596 30 L800 30 L1080 120 L1440 120 L1440 150 Z" fill="#20262E"/>
    <rect x="586" y="-14" width="4" height="26" fill="#E9A820"/>
    <rect x="578" y="-6" width="20" height="4" fill="#E9A820"/>
  </svg>
</body>
</html>
